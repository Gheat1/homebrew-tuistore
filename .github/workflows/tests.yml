name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      # macos-latest runners ship Homebrew preinstalled — no setup action
      # needed, and it sidesteps a cleanup bug in Homebrew/actions/setup-homebrew
      - name: Tap this checkout
        run: |
          brew untap gheat1/tuistore 2>/dev/null || true
          brew tap gheat1/tuistore "file://${{ github.workspace }}"

      - run: brew style gheat1/tuistore/tuistore
      - run: brew audit --online gheat1/tuistore/tuistore
      - run: brew install gheat1/tuistore/tuistore
      - run: brew test gheat1/tuistore/tuistore
